<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <title>{{ _("Edición bloqueada") }}</title>
    <style>
      body {
        margin: 0;
        font-family: "IBM Plex Mono", "Courier New", monospace;
        background: #0b1014;
        color: #e6edf3;
        display: grid;
        place-items: center;
        min-height: 100vh;
        padding: 24px;
      }
      .card {
        border: 1px solid #1f2a33;
        background: #0f151a;
        border-radius: 12px;
        padding: 20px;
        max-width: 420px;
        text-align: center;
        box-shadow: 0 16px 30px rgba(0, 0, 0, 0.4);
      }
      .card h1 {
        margin: 0 0 10px;
        font-size: 18px;
      }
      .card p {
        margin: 0 0 12px;
        color: #9aa7b3;
        font-size: 14px;
      }
      .card a {
        color: #6ee7b7;
        text-decoration: none;
        font-weight: 600;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <h1>{{ _("Edición bloqueada") }}</h1>
      <p>{{ message }}</p>
      <a href="{{ url_for('map.report_detail', post_id=post_id) }}">{{ _("Ver reporte") }}</a>
    </div>
  </body>
</html>
