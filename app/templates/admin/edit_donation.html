{% extends "shared/base.html" %}
{% block title %} | {{ _("Editar donación") }}{% endblock %}
{% block content %}
<section class="panel">
  <h1>{{ _("Editar donación") }}</h1>
  <form method="post" class="form-grid">
    <label>
      {{ _("Monto de la donación") }}
      <input type="text" name="amount" value="{{ log.amount }}" required />
    </label>
    <label>
      {{ _("Vía de la donación") }}
      <input type="text" name="method" value="{{ log.method }}" required />
    </label>
    <label>
      {{ _("Fecha de la donación") }}
      <input type="date" name="donated_at" value="{{ log.donated_at }}" required />
    </label>
    <label>
      {{ _("Destino de la donación") }}
      <input type="text" name="destination" value="{{ log.destination }}" required />
    </label>
    <div style="display:flex; gap:12px;">
      <button type="submit" class="btn-primary">{{ _("Guardar cambios") }}</button>
      <a class="btn-secondary" href="{{ url_for('admin.donations') }}">{{ _("Volver") }}</a>
    </div>
  </form>
</section>
{% endblock %}
