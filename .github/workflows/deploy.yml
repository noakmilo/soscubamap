name: Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: production-deploy
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy to DigitalOcean droplet
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Setup SSH key
        run: |
          install -m 700 -d ~/.ssh
          cat <<'EOF' > ~/.ssh/id_ed25519
          ${{ secrets.DO_SSH_PRIVATE_KEY }}
          EOF
          chmod 600 ~/.ssh/id_ed25519

      - name: Add server to known_hosts
        run: |
          touch ~/.ssh/known_hosts
          if [ -n "${{ secrets.DO_SSH_KNOWN_HOSTS }}" ]; then
            printf "%s\n" "${{ secrets.DO_SSH_KNOWN_HOSTS }}" >> ~/.ssh/known_hosts
          else
            ssh-keyscan -p "${{ vars.DO_SSH_PORT || 22 }}" "${{ vars.DO_HOST }}" >> ~/.ssh/known_hosts
          fi

      - name: Run deploy script on droplet
        run: |
          ssh -p "${{ vars.DO_SSH_PORT || 22 }}" \
            "${{ vars.DO_SSH_USER }}@${{ vars.DO_HOST }}" \
            "bash /home/soscuba/soscubamap/deploy.sh"
