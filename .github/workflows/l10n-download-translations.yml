name: l10n-download-translations

on:
  workflow_dispatch:
  schedule:
    - cron: "0 */6 * * *"

jobs:
  download:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download translations from Crowdin and create PR
        uses: crowdin/github-action@v2
        with:
          upload_sources: false
          upload_translations: false
          download_translations: true
          localization_branch_name: chore/l10n-crowdin-sync
          create_pull_request: true
          pull_request_title: "chore(i18n): sync translations from Crowdin"
          pull_request_body: "Automated translation sync from Crowdin."
          pull_request_labels: "i18n,automated"
          config: crowdin.yml
        env:
          CROWDIN_PROJECT_ID: ${{ secrets.CROWDIN_PROJECT_ID }}
          CROWDIN_PERSONAL_TOKEN: ${{ secrets.CROWDIN_PERSONAL_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
